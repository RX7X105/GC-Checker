<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GCchecker (公開用)</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:6px;
    background:#111;
    color:#fff;
    font-family:sans-serif;
}

:root{
    --base-font: clamp(16px, 2.1vh, 24px);
}

.gcRow{
    display:flex;
    align-items:center;
    gap:10px;
    margin:6px 0;
}

.label{
    flex:0 0 clamp(84px, 14vw, 120px);
    width:clamp(84px, 14vw, 120px);
    font-size:var(--base-font);
    font-weight:bold;
    white-space:nowrap;
}
.gcBtns{
    display:flex;
    gap:6px;
}

.gcBtns .btn{
    font-size:var(--base-font);
    line-height:1;
    height:3.0em;
    padding:0 9px;
    border:none;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
    flex:0 0 auto;
    width:10.0em;
    text-align:center;
    background:#444;
    color:#fff;
}

.btn.active{
    background:#1e8e3e;
}

.btn{
    border:none;
    border-radius:8px;
    font-size:var(--base-font);
    font-weight:bold;
    background:#333;
    color:#fff;
}

.result{
    margin-top:6px;
    background:#000;
    border:1px solid #666;
    border-radius:8px;
    padding:10px;
    line-height:1.45;
    font-size:clamp(19px,2.85vh,42px);
    font-weight:bold;
}

.stop, .yellow-text { color:#ffd600; font-weight:900; }
.move, .cyan-text { color:#4fc3ff; font-weight:900; }

/* ⑦予測マトリクス用のレイアウト（幅固定・折り返し防止） */
.result-table {
    margin: 8px auto 0 auto;
    border-collapse: collapse;
    font-size: 0.8em;
    text-align: center;
    table-layout: fixed;
    width: 440px; /* 80px + (90px * 4) */
}
.result-table td, .result-table th {
    padding: 6px 0;
    border: 1px solid #444;
    white-space: nowrap;
    overflow: hidden;
    vertical-align: middle;
}
.result-table th.row-label {
    text-align: left;
    width: 80px;
    font-weight: bold;
    border: none;
}
.result-table td.cell-data {
    width: 90px;
}
.result-ans {
    background: #222;
    font-weight: 900;
    color: #fff;
}

.btnRow{
    display:flex;
    gap:6px;
    margin-top:6px;
}

.reset,
#modeBtn{
    flex:1;
    height:clamp(46px,6.2vh,76px);
    border:none;
    border-radius:8px;
    font-weight:bold;
    font-size:var(--base-font);
    white-space:nowrap;
}

.reset{ background:#b00020; color:#fff; }
#modeBtn{ background:#444; color:#fff; }

.headshare{ color:#4fc3ff; font-weight:900; }
.spread{ color:#ffd600; font-weight:900; }

.statusIcon{
    height:1.35em;
    width:auto;
    margin-left:0.35em;
    vertical-align:middle;
    border-radius:50%;
}
/* マトリクス内のアイコン調整用 */
.tableIcon {
    height: 1.5em;
    width: auto;
    vertical-align: middle;
    border-radius: 50%;
}
</style>
</head>

<body>

<!-- GC1 -->
<div class="gcRow">
    <div class="label">GC1</div>
    <div class="gcBtns">
        <button class="btn" data-id="f1"></button>
        <button class="btn" data-id="t1"></button>
    </div>
</div>

<!-- GC2 -->
<div class="gcRow">
    <div class="label">GC2</div>
    <div class="gcBtns">
        <button class="btn" data-id="f2"></button>
    </div>
</div>

<!-- ほのお・つなみ -->
<div class="gcRow">
    <div class="label">炎・津波</div>
    <div class="gcBtns">
        <button class="btn" data-id="c5" data-label="ほのお"></button>
        <button class="btn" data-id="c6" data-label="つなみ"></button>
    </div>
</div>

<!-- サンダガ -->
<div class="gcRow">
    <div class="label">サンダガ</div>
    <div class="gcBtns">
        <button class="btn" data-id="c8" data-label="チャージ"></button>
        <button class="btn out-btn" data-id="d8" data-label="アウト"></button>
    </div>
</div>

<!-- ブリザガ -->
<div class="gcRow">
    <div class="label">ブリザガ</div>
    <div class="gcBtns">
        <button class="btn" data-id="c9" data-label="チャージ"></button>
        <button class="btn out-btn" data-id="d9" data-label="アウト"></button>
    </div>
</div>

<!-- 結果 -->
<div id="result" class="result"></div>

<!-- 下部 -->
<div class="btnRow">
    <button class="reset" onclick="resetAll()">リセット</button>
    <button id="modeBtn" onclick="toggleMode()">モード：未来予測</button>
</div>

<script>

const s = {
    firstThunderEarly:true,
    f1:true,
    f2:true,
    c5:true,
    c6:true,
    c8:true,
    d8:true,
    c9:true,
    d9:true
};

let predictMode = true;

function renderUI(){
    document.querySelectorAll(".out-btn").forEach(btn => {
        btn.style.display = predictMode ? "none" : "flex";
    });

    document.querySelectorAll(".btn").forEach(btn=>{
        const id = btn.dataset.id;
        let val = (id==="t1") ? s.firstThunderEarly : s[id];
        btn.classList.toggle("active", !!val);

        if(id==="t1"){
            btn.textContent = "水雷（" + (s.firstThunderEarly ? "早" : "遅") + "）";
        }
        else if(id==="f1" || id==="f2"){
            btn.innerHTML = s[id]
                ? '真 <img src="真.png" class="statusIcon">'
                : '偽 <img src="偽.png" class="statusIcon">';
        }
        else{
            btn.innerHTML = val
                ? `${btn.dataset.label}（真 <img src="真.png" class="statusIcon">）`
                : `${btn.dataset.label}（偽 <img src="偽.png" class="statusIcon">）`;
        }
    });
}

function make(j){
    return j
        ? '水：<span class="headshare">頭割り</span> 雷：<span class="spread">散開</span>'
        : '水：<span class="spread">散開</span> 雷：<span class="headshare">頭割り</span>';
}

function calc(){
    const f1 = s.f1;
    const f2 = s.f2;
    let r1,r4;

    if(s.firstThunderEarly){
        r1 = make(f1);
        r4 = make(f2);
    }else{
        r1 = make(f2);
        r4 = make(f1);
    }

    const v1 = f1 ? '<span class="yellow-text">外向く</span>' : '<span class="cyan-text">中向く</span>';
    const v4 = f2 ? '<span class="yellow-text">外向く</span>' : '<span class="cyan-text">中向く</span>';
    const k5 = s.c5 ? '<span class="yellow-text">中央から外へ</span>' : '<span class="cyan-text">中央待機</span>';
    const k6 = s.c6 ? '<span class="cyan-text">中央待機</span>' : '<span class="yellow-text">中央から外へ</span>';

    const stop = '<span class="stop">止まる</span>';
    const move = '<span class="move">動く</span>';

    let resultHtml = `① ${r1}
<br> 早視線：${f1 ? stop : move} GC2無職：${f2 ? stop : move}
<br>② ${v1}
<br>③ ${k5}
<br>④ ${r4}
<br> 遅視線：${f2 ? stop : move} GC1無職：${f1 ? stop : move}
<br>⑤ ${v4}
<br>⑥ ${k6}<br>`;

    if (predictMode) {
        const res_tt8 = s.c8 ? "踏まない" : "直線";
        const res_tt9 = s.c9 ? "踏まない" : "扇";
        let pattern_TT = (res_tt8 === "踏まない" && res_tt9 === "踏まない") ? "踏まない" : 
                         (res_tt8 !== "踏まない" && res_tt9 !== "踏まない") ? "踏む踏む" : (res_tt8 === "踏まない" ? "扇踏む" : "直線踏む");

        const res_ff8 = !s.c8 ? "踏まない" : "直線";
        const res_ff9 = !s.c9 ? "踏まない" : "扇";
        let pattern_FF = (res_ff8 === "踏まない" && res_ff9 === "踏まない") ? "踏まない" : 
                         (res_ff8 !== "踏まない" && res_ff9 !== "踏まない") ? "踏む踏む" : (res_ff8 === "踏まない" ? "扇踏む" : "直線踏む");

        const res_tf8 = s.c8 ? "踏まない" : "直線";
        const res_tf9 = !s.c9 ? "踏まない" : "扇";
        let pattern_TF = (res_tf8 === "踏まない" && res_tf9 === "踏まない") ? "踏まない" : 
                         (res_tf8 !== "踏まない" && res_tf9 !== "踏まない") ? "踏む踏む" : (res_tf8 === "踏まない" ? "扇踏む" : "直線踏む");

        const res_ft8 = !s.c8 ? "踏まない" : "直線";
        const res_ft9 = s.c9 ? "踏まない" : "扇";
        let pattern_FT = (res_ft8 === "踏まない" && res_ft9 === "踏まない") ? "踏まない" : 
                         (res_ft8 !== "踏まない" && res_ft9 !== "踏まない") ? "踏む踏む" : (res_ft8 === "踏まない" ? "扇踏む" : "直線踏む");

        const imgT = '<img src="真.png" class="tableIcon">';
        const imgF = '<img src="偽.png" class="tableIcon">';

        // 〇と？を画像タグに置き換え
        resultHtml += `⑦ 最終候補
<table class="result-table">
    <tr>
        <th class="row-label">雷 (上)</th>
        <td class="cell-data">${imgT}</td>
        <td class="cell-data">${imgT}</td>
        <td class="cell-data">${imgF}</td>
        <td class="cell-data">${imgF}</td>
    </tr>
    <tr>
        <th class="row-label">氷 (下)</th>
        <td class="cell-data">${imgT}</td>
        <td class="cell-data">${imgF}</td>
        <td class="cell-data">${imgT}</td>
        <td class="cell-data">${imgF}</td>
    </tr>
    <tr class="result-ans">
        <th class="row-label" style="background:#000;">結果</th>
        <td class="cell-data">${pattern_TT}</td>
        <td class="cell-data">${pattern_TF}</td>
        <td class="cell-data">${pattern_FT}</td>
        <td class="cell-data">${pattern_FF}</td>
    </tr>
</table>`;
    } else {
        const j8 = (s.c8 === s.d8) ? "踏まない" : "直線";
        const j9 = (s.c9 === s.d9) ? "踏まない" : "扇";
        
        let l1;
        if(j8==="踏まない" && j9==="踏まない") l1="踏まない";
        else if(j8!=="踏まない" && j9!=="踏まない") l1="踏む踏む";
        else l1=(j8==="踏まない") ? "扇踏む" : "直線踏む";

        resultHtml += `⑦ 結果：【 ${l1} 】`;
    }

    document.getElementById("result").innerHTML = resultHtml;
}

function toggleMode(){
    predictMode = !predictMode;
    document.getElementById("modeBtn").textContent =
        predictMode ? "モード：予測" : "モード：手動入力";
    renderUI();
    calc();
}

document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        const id = btn.dataset.id;
        if(id==="t1") s.firstThunderEarly = !s.firstThunderEarly;
        else s[id] = !s[id];
        renderUI();
        calc();
    });
});

function resetAll(){
    Object.keys(s).forEach(k=>{
        if(typeof s[k]==="boolean") s[k]=true;
    });
    s.firstThunderEarly = true;
    renderUI();
    calc();
}

renderUI();
calc();

</script>

</body>
</html>
